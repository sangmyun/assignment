spring:
  datasource:
    url: jdbc:mysql://localhost:3306/memberdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Test1234!}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false

logging:
  level:
    org.hibernate.SQL: debug
