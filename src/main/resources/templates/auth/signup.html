<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="card form-card">
        <p class="eyebrow">Create account</p>
        <h1>회원가입</h1>
        <p class="lead">새 계정을 만들기 위해 정보를 입력해 주세요.</p>

        <form th:action="@{/signup}" method="post">
            <label for="loginId">아이디</label>
            <input id="loginId" name="loginId" th:value="${signupForm.loginId}" type="text" placeholder="4~20자">
            <p class="field-error" th:if="${loginIdError}" th:text="${loginIdError}"></p>

            <label for="password">비밀번호</label>
            <input id="password" name="password" th:value="${signupForm.password}" type="password" placeholder="비밀번호 입력">
            <p class="field-error" th:if="${passwordError}" th:text="${passwordError}"></p>

            <label for="passwordConfirm">비밀번호 확인</label>
            <input id="passwordConfirm" name="passwordConfirm" th:value="${signupForm.passwordConfirm}" type="password" placeholder="비밀번호 다시 입력">
            <p class="field-error" th:if="${passwordConfirmError}" th:text="${passwordConfirmError}"></p>

            <label for="name">이름</label>
            <input id="name" name="name" th:value="${signupForm.name}" type="text" placeholder="이름 입력">
            <p class="field-error" th:if="${nameError}" th:text="${nameError}"></p>

            <button class="button primary full" type="submit">계정 만들기</button>
        </form>

        <p class="sub-link">이미 계정이 있으면 <a th:href="@{/login}">로그인</a></p>
    </div>
</div>
</body>
</html>
