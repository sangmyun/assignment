<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page page-wide">
    <div class="planner-shell">
        <aside class="planner-sidebar">
            <div class="card sidebar-card">
                <div class="sidebar-brand">
                    <p class="eyebrow">게시판</p>
                    <h2>글쓰기</h2>
                    <p class="sidebar-subtitle">새 게시글을 작성합니다.</p>
                </div>
                <nav class="sidebar-nav">
                    <a class="sidebar-link" th:href="@{/dashboard}">일정표</a>
                    <a class="sidebar-link active" th:href="@{/boards}">게시판</a>
                    <a class="sidebar-link" th:href="@{/me}">계정 설정</a>
                </nav>
            </div>
        </aside>

        <main class="planner-main">
            <section class="card board-card">
                <p class="eyebrow">새 글</p>
                <h1>게시글 작성</h1>

                <form th:action="@{/boards/new}" th:object="${postForm}" method="post">
                    <label for="title">제목</label>
                    <input id="title" th:field="*{title}" type="text" placeholder="제목을 입력하세요">
                    <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

                    <label for="content">내용</label>
                    <textarea id="content" th:field="*{content}" class="text-area" rows="10"
                              placeholder="내용을 입력하세요"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
                    <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:each="e : ${#fields.globalErrors()}" th:text="${e}"></p>

                    <div class="actions">
                        <button class="button primary" type="submit">등록</button>
                        <a class="button secondary" th:href="@{/boards}">목록</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
</body>
</html>
