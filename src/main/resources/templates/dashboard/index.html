<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 관리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page page-wide">
    <div class="planner-shell">
        <aside class="planner-sidebar">
            <div class="card sidebar-card">
                <div class="sidebar-brand">
                    <p class="eyebrow">Planner</p>
                    <h2>일정 관리</h2>
                    <p class="sidebar-subtitle">날짜를 선택하고 일정을 입력해 관리하세요.</p>
                </div>

                <nav class="sidebar-nav">
                    <a class="sidebar-link active" th:href="@{/dashboard}">일정</a>
                    <a class="sidebar-link" th:href="@{/me}">계정 정보</a>
                </nav>

                <div class="sidebar-section">
                    <h3>현재 계정</h3>
                    <p class="sidebar-subtitle">
                        <strong th:text="${m.name}">회원</strong>님
                    </p>
                </div>

                <div class="sidebar-section">
                    <form th:action="@{/logout}" method="post" class="full-form">
                        <button class="button ghost full-width" type="submit">로그아웃</button>
                    </form>
                </div>
            </div>
        </aside>

        <main class="planner-main">
            <section class="card planner-hero">
                <p class="eyebrow">Calendar</p>
                <h1><span th:text="${m.name}">회원</span>님의 일정 대시보드</h1>
                <p class="lead">달력에서 날짜를 선택하고 일정을 추가, 삭제, 정렬할 수 있습니다.</p>

                <div class="planner-summary">
                    <div class="summary-chip">
                        <span class="summary-chip-label">오늘 일정</span>
                        <strong id="todayCount">0</strong>
                    </div>
                    <div class="summary-chip">
                        <span class="summary-chip-label">이번 달 일정</span>
                        <strong id="monthCount">0</strong>
                    </div>
                    <div class="summary-chip">
                        <span class="summary-chip-label">선택 날짜</span>
                        <strong id="selectedSummaryDate">Today</strong>
                    </div>
                </div>
            </section>

            <div class="planner-grid">
                <section class="card calendar-card">
                    <div class="calendar-head">
                        <button id="prevMonthButton" class="icon-button" type="button">이전</button>
                        <div>
                            <h2 id="calendarTitle">2026.3</h2>
                            <p id="selectedDateText" class="calendar-subtitle">날짜를 선택하세요.</p>
                        </div>
                        <button id="nextMonthButton" class="icon-button" type="button">다음</button>
                    </div>

                    <div class="weekdays">
                        <span>Sun</span>
                        <span>Mon</span>
                        <span>Tue</span>
                        <span>Wed</span>
                        <span>Thu</span>
                        <span>Fri</span>
                        <span>Sat</span>
                    </div>

                    <div id="calendarGrid" class="calendar-grid"></div>
                </section>

                <section class="card schedule-card">
                    <div class="panel-head">
                        <h2>일정 입력</h2>
                        <p>선택한 날짜에 일정을 추가하고 목록을 확인하세요.</p>
                    </div>

                    <label for="scheduleInput">내용</label>
                    <textarea id="scheduleInput" class="text-area" rows="5" placeholder="예: 3시 발표 준비"></textarea>

                    <div class="actions">
                        <button id="saveScheduleButton" class="button primary" type="button">저장</button>
                    </div>

                    <div class="panel-head list-head">
                        <div class="calendar-head">
                            <strong><span id="selectedListDate"></span></strong>
                            <button id="saveOrderButton" class="button secondary" type="button">순서 저장</button>
                        </div>
                    </div>

                    <div id="dailyScheduleList" class="daily-schedule-list"></div>
                    <p id="scheduleStatus" class="hint">날짜를 선택하면 해당 날짜의 일정을 볼 수 있습니다.</p>
                </section>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/dashboard-planner.js(v=20260427)}"></script>
</body>
</html>
