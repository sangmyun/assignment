<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="card hero-card">
        <p class="eyebrow">Account</p>

        <div th:if="${authenticated}">
            <h1>안녕하세요</h1>
            <p class="lead">계정 정보를 확인하거나 수정할 수 있습니다.</p>

            <div class="actions">
                <a class="button primary" th:href="@{/me}">내 정보</a>
                <form th:action="@{/logout}" method="post">
                    <button class="button secondary" type="submit">로그아웃</button>
                </form>
            </div>

            <p class="hint">
                로그인 아이디 <strong th:text="${loginId}"></strong>
            </p>
        </div>

        <div th:unless="${authenticated}">
            <h1>로그인</h1>
            <p class="lead">계속하려면 계정에 로그인하세요.</p>

            <div class="actions">
                <a class="button primary" th:href="@{/login}">로그인</a>
                <a class="button secondary" th:href="@{/signup}">회원가입</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
