<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 설정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="card form-card">
        <p class="eyebrow">Security</p>
        <h1>비밀번호 변경</h1>
        <p class="lead">계정 보안을 위해 현재 비밀번호를 확인한 뒤 새 비밀번호로 변경할 수 있습니다.</p>

        <form th:action="@{/me/password}" th:object="${updatePasswordForm}" method="post">
            <label for="currentPassword">현재 비밀번호</label>
            <input id="currentPassword" th:field="*{currentPassword}" type="password" placeholder="현재 비밀번호 입력">
            <p class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>

            <label for="newPassword">새 비밀번호</label>
            <input id="newPassword" th:field="*{newPassword}" type="password" placeholder="새 비밀번호 입력">
            <p class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>

            <label for="newPasswordConfirm">새 비밀번호 확인</label>
            <input id="newPasswordConfirm" th:field="*{newPasswordConfirm}" type="password" placeholder="새 비밀번호 다시 입력">
            <p class="field-error" th:if="${#fields.hasErrors('newPasswordConfirm')}" th:errors="*{newPasswordConfirm}"></p>

            <button class="button primary full" type="submit">비밀번호 저장</button>
        </form>

        <p class="sub-link"><a th:href="@{/me}">계정 설정으로 돌아가기</a></p>
    </div>
</div>
</body>
</html>
