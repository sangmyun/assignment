<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암호 변경</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="card form-card">
        <h1>암호 변경</h1>

        <form th:action="@{/me/password}" th:object="${updatePasswordForm}" method="post">
            <label for="currentPassword">현재 암호</label>
            <input id="currentPassword" th:field="*{currentPassword}" type="password" placeholder="현재 암호 입력">
            <p class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>

            <label for="newPassword">새 암호</label>
            <input id="newPassword" th:field="*{newPassword}" type="password" placeholder="새 암호 입력">
            <p class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>

            <label for="newPasswordConfirm">새 암호 확인</label>
            <input id="newPasswordConfirm" th:field="*{newPasswordConfirm}" type="password" placeholder="새 암호 다시 입력">
            <p class="field-error" th:if="${#fields.hasErrors('newPasswordConfirm')}" th:errors="*{newPasswordConfirm}"></p>

            <button class="button primary full" type="submit">암호 저장</button>
        </form>

        <p class="sub-link"><a th:href="@{/me}">내 정보로 돌아가기</a></p>
    </div>
</div>
</body>
</html>
